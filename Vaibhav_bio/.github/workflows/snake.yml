name: Generate Profile Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          # count_private=true only works if token below has cross-repo
          # read access — GITHUB_TOKEN can't see your other private repos,
          # so private contributions won't be counted until you swap in a
          # PAT (repo, read:user scopes) stored as a secret instead.
          options: "username=${{ github.repository_owner }}&show_icons=true&hide_border=true&bg_color=0d0b14&title_color=F97316&icon_color=F97316&text_color=f5f5f5&include_all_commits=true&count_private=true"
          path: dist/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&hide_border=true&bg_color=0d0b14&title_color=F97316&text_color=f5f5f5"
          path: dist/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
